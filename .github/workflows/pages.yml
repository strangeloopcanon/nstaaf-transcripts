name: Publish Transcript Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: transcript-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[site]"

      - name: Refresh transcript corpus
        if: github.event_name != 'push'
        env:
          NSTAAF_REQUEST_TIMEOUT_SECONDS: "10"
        run: |
          nstaaf discover
          nstaaf refresh

      - name: Export static site source
        run: nstaaf export-site

      - name: Commit updated corpus
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add corpus data/episodes data/source_urls.csv data/freshness_status.json data/gap_episodes.json

          if git diff --cached --quiet; then
            echo "No corpus changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh transcript corpus [skip ci]"
          git push

      - name: Build static site
        run: mkdocs build --strict

      - name: Index search with Pagefind
        run: npx -y pagefind@1.4.0 --site site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
